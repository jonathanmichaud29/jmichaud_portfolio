events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    upstream astro_node {
        server node:4321;
    }

    server {
        listen 80;
        server_name localhost;

        root /var/www/html;

        # --------------------------------------------------------
        # Static assets — served directly by Nginx, never hits Node
        # Astro outputs these to dist/client/
        # --------------------------------------------------------
        location /_astro/ {
            try_files $uri =404;
            # Astro hashes filenames — safe to cache aggressively
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /images/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /robots.txt {
            try_files $uri =404;
        }

        location = /favicon.ico {
            try_files $uri =404;
        }

        # --------------------------------------------------------
        # SSR — all other requests proxied to the Node container
        # --------------------------------------------------------
        location / {
            proxy_pass http://astro_node;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }
}
